apiVersion: apps/v1
kind: Deployment
metadata:
  name: icebox-governance
  labels:
    app: icebox
spec:
  replicas: 1
  selector:
    matchLabels:
      app: icebox
  template:
    metadata:
      labels:
        app: icebox
    spec:
      containers:
      - name: icebox
        image: ghcr.io/devaretanmay/icebox:latest
        ports:
        - containerPort: 8443
        args: ["--api"]
