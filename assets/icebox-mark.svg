<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <!-- Frost White Background -->
  <rect width="100" height="100" fill="#F1F5F7" />
  
  <!-- Core Ice Background Disc -->
  <circle cx="50" cy="54" r="40" fill="#C9DCE6" />
  
  <!-- Seam Black Rings (The Core Layers) -->
  <circle cx="50" cy="54" r="40" stroke="#0E1620" stroke-width="6" />
  <circle cx="50" cy="54" r="28" stroke="#0E1620" stroke-width="6" />
  <circle cx="50" cy="54" r="16" stroke="#0E1620" stroke-width="6" />
  
  <!-- Center Core (Signal Teal) -->
  <circle cx="50" cy="54" r="13" fill="#2E8C93" />
  
  <!-- Cutout to make the orange wedge stand out against white background -->
  <path d="M50 54 L38 0 L62 0 Z" fill="#F1F5F7" />
  
  <!-- The Governance Seam (Hazard Orange Wedge) -->
  <path d="M50 54 L44 14 L56 14 Z" fill="#E8542A" />
  
  <!-- Top Indicator Notch (Hazard Orange) -->
  <rect x="47" y="4" width="6" height="8" fill="#E8542A" />
</svg>
