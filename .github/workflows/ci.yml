name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            . -> target

      - name: Build all crates
        run: cargo build --all --verbose

      - name: Run all tests
        run: cargo test --all --verbose

      - name: Run clippy
        run: cargo clippy --all -- -D warnings

      - name: Check formatting
        run: cargo fmt --check

      # Suppress the known dead_code warning on OsvEvent (OSV fields
      # deserialized from API response but not yet queried directly).
      - name: Check for unexpected warnings
        run: |
          cargo build --all 2>&1 | grep -E "^warning:" | grep -v "OsvEvent" && exit 1 || exit 0

  python-sdk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Build C ABI shared library
        run: cargo build

      - name: Verify Python SDK loads and imports
        run: |
          cd python
          python -c "
          import sys
          sys.path.insert(0, '.')
          from icebox import Governance
          print('Python SDK loaded successfully')
          "
        env:
          ICEBOX_CAPI: ../target/debug/libicebox.so
