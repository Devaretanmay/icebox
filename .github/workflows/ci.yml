name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  lint:
    name: Lint (clippy + fmt)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: rustfmt
        run: cargo fmt --all -- --check
      - name: clippy
        run: cargo clippy --all-targets -- -D warnings

  test:
    name: Test (cargo unit + python SDK)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: Rust unit tests (lib)
        run: cargo test -p icebox-gov --lib

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install maturin + deps
        run: pip install maturin pytest
      - name: Build extension + install SDK (editable)
        run: maturin develop
      - name: Python SDK tests
        run: pytest tests/test_sdk.py -q
