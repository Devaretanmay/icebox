name: ICEBOX Validation
on: [push, pull_request]
jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start ICEBOX API
        run: |
          docker run -d -p 8443:8443 ghcr.io/devaretanmay/icebox:latest --api
          sleep 3
      - name: Run Tests
        run: echo "Execute your test suite against localhost:8443"
