name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  binaries:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-musl, name: icebox-linux-x86_64, zig: true }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-musl, name: icebox-linux-aarch64, zig: true }
          - { os: macos-latest, target: x86_64-apple-darwin, name: icebox-macos-x86_64, zig: false }
          - { os: macos-latest, target: aarch64-apple-darwin, name: icebox-macos-aarch64, zig: false }
          - { os: windows-latest, target: x86_64-pc-windows-msvc, name: icebox-windows-x86_64, zig: false }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - name: Install zig (for static musl builds)
        if: matrix.zig
        uses: mlugg/setup-zig@v4
      - name: Install cargo-zigbuild
        if: matrix.zig
        run: cargo install cargo-zigbuild --locked
      - name: Build (zig / musl)
        if: matrix.zig
        run: cargo zigbuild --release --target ${{ matrix.target }}
      - name: Build
        if: ${{ !matrix.zig }}
        run: cargo build --release --target ${{ matrix.target }}
      - name: Package
        shell: bash
        run: |
          SRC="target/${{ matrix.target }}/release"
          STAGE="stage/${{ matrix.name }}"
          mkdir -p "$STAGE"
          cp "$SRC/icebox" "$STAGE/" 2>/dev/null || cp "$SRC/icebox.exe" "$STAGE/"
          cp "$SRC"/libicebox.* "$STAGE/" 2>/dev/null || true
          tar -czf "${{ matrix.name }}.tar.gz" -C stage "${{ matrix.name }}"
      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: ${{ matrix.name }}.tar.gz
          if-no-files-found: error

  release:
    name: Create GitHub Release
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          merge-multiple: true
          path: artifacts
      - uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate-release-notes: true

  docker:
    name: GHCR image
    runs-on: ubuntu-latest
    permissions:
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=raw,value=latest
      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

  crates:
    name: Publish to crates.io
    needs: binaries
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      # The proc-macro crate must publish before the main crate that
      # depends on it (crates.io index propagation needs a moment).
      - name: cargo publish (icebox-macro)
        run: cargo publish -p icebox-macro --token ${{ secrets.CARGO_REGISTRY_TOKEN }}
      - name: Wait for index propagation
        run: sleep 30
      - name: cargo publish (icebox)
        run: cargo publish --token ${{ secrets.CARGO_REGISTRY_TOKEN }}

  pypi:
    name: Publish to PyPI (icebox-sdk)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Build distributions
        run: |
          python -m pip install -q build twine
          python -m build
      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
