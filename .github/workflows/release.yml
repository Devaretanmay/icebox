# Release workflow — distribution (Phase 4).
#
# Triggered by pushing a `v*` tag. Builds the daemon binaries for all targets
# and creates a GitHub Release with those binaries attached.
#
# Publishing to crates.io / PyPI / GHCR is intentionally MANUAL — run it from
# your machine (or a trusted runner) with the real tokens, never from CI.
# See .github/RELEASE_PROCESS.md for the manual publish steps.
#
# NOTE: rotate CARGO_REGISTRY_TOKEN / PYPI_API_TOKEN if they were ever shared
# in chat before doing any manual publish.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  verify:
    name: Verify release builds & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - run: cargo fmt --all -- --check && cargo clippy --all-targets -- -D warnings
      - run: cargo test -p icebox-gov --lib

  binaries:
    name: Build binaries (${{ matrix.os }})
    needs: verify
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - name: Build daemon binary
        run: cargo build --release --bin icebox-daemon --target ${{ matrix.target }}
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: icebox-daemon-${{ matrix.target }}
          path: |
            target/${{ matrix.target }}/release/icebox-daemon
            target/${{ matrix.target }}/release/icebox-daemon.exe
          if-no-files: ignore

  github-release:
    name: Create GitHub Release
    needs: [binaries]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Stage binaries
        run: |
          mkdir -p release_bins
          find artifacts -type f \( -name 'icebox-daemon' -o -name 'icebox-daemon.exe' \) -exec cp {} release_bins/ \;
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release_bins/*
          generate_release_notes: true
