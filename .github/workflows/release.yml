# Release workflow — scaffold for Phase 4 (distribution).
#
# Publishing is intentionally DISABLED until the distribution phase lands the
# real publish steps (crates.io / PyPI / GHCR / GitHub Releases). This workflow
# currently only validates that a `v*` tag builds and tests cleanly, so every
# future tagged release passes through the same gate as CI.
#
# When distribution is wired (Phase 4), add jobs here for:
#   - cargo publish  (icebox-gov)         [needs CARGO_REGISTRY_TOKEN]
#   - pypi publish   (icebox-sdk)         [needs PYPI_TOKEN]
#   - docker build+push to ghcr.io/devaretanmay/icebox [needs GHCR_PAT]
#   - GitHub Release with linux/macos/windows binaries
#
# Secrets required (add in repo Settings > Secrets before enabling publish):
#   CARGO_REGISTRY_TOKEN, PYPI_TOKEN, GHCR_PAT

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  verify-tag:
    name: Verify release tag builds & tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt
      - uses: Swatinem/rust-cache@v2
      - name: fmt + clippy
        run: cargo fmt --all -- --check && cargo clippy --all-targets -- -D warnings
      - name: test
        run: cargo test -p icebox-gov --lib
      - name: confirm tag is a kernel freeze or product release
        run: |
          echo "Releasing ${GITHUB_REF_NAME}"
          # Kernel is frozen; any tag that is not a documented release is a mistake.
          if [[ "${GITHUB_REF_NAME}" =~ ^v0\.2\.5-kernel-complete$ ]]; then
            echo "Frozen-kernel baseline tag — no publish expected."
          fi
